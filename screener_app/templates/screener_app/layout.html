<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Resume Screener{% endblock %}</title>
    <meta name="description" content="AI-Powered Resume Screening & Ranking System using NLP & Machine Learning.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}" id="nav-logo">
                <i class="fa-solid fa-robot me-2 fs-4 text-primary"></i>
                <span class="fw-bold tracking-tight">AI Resume Screener</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link px-3 {% if request.resolver_match.url_name == 'dashboard' %}active text-white{% endif %}" href="{% url 'dashboard' %}" id="nav-home">
                            <i class="fa-solid fa-house me-1"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 {% if request.resolver_match.url_name == 'job_list' or request.resolver_match.url_name == 'job_detail' %}active text-white{% endif %}" href="{% url 'job_list' %}" id="nav-jobs">
                            <i class="fa-solid fa-briefcase me-1"></i> Jobs
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 {% if request.resolver_match.url_name == 'create_job' %}active text-white{% endif %}" href="{% url 'create_job' %}" id="nav-create">
                            <i class="fa-solid fa-plus me-1"></i> Create Job
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 {% if request.resolver_match.url_name == 'analytics' %}active text-white{% endif %}" href="{% url 'analytics' %}" id="nav-analytics">
                            <i class="fa-solid fa-chart-simple me-1"></i> Analytics
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-4 border-top border-secondary border-opacity-10 text-center text-muted mt-5">
        <div class="container">
            <p class="mb-0 fs-7">&copy; 2026 AI Resume Screener Project. Automated Recruiting powered by NLP & Machine Learning.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
